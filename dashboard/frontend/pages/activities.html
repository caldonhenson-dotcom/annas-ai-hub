<section id="activities" class="dashboard-section">
    <div class="section-header">
        <div>
            <h2 class="section-title">Activity Tracking</h2>
            <p class="section-subtitle">Team activity, rep performance, and engagement metrics</p>
        </div>
    </div>

    <!-- KPI Comparison Cards -->
    <div class="pl-activity-totals" id="act-kpi-totals" style="grid-template-columns:repeat(6,1fr)"></div>

    <!-- Row 1: Activity Breakdown Doughnut + Daily Trend -->
    <div class="pl-grid-2">
        <div class="pl-card">
            <div class="pl-card-header">
                <div class="pl-card-title">Activity Breakdown</div>
                <div class="pl-card-meta">Last 30 days</div>
            </div>
            <div class="pl-chart-wrap" id="act-breakdown-chart" style="height:260px"></div>
        </div>
        <div class="pl-card">
            <div class="pl-card-header">
                <div class="pl-card-title">Activity Trend</div>
                <div class="pl-card-meta">Monthly | Last 12 months</div>
            </div>
            <div class="pl-chart-wrap" id="act-trend-chart" style="height:260px"></div>
        </div>
    </div>

    <!-- Row 2: Activity Leaderboard by Rep (full width) -->
    <div class="pl-card pl-card-full">
        <div class="pl-card-header">
            <div class="pl-card-title">Activity Leaderboard by Rep</div>
            <div class="pl-card-meta">Year to date</div>
        </div>
        <div id="act-leaderboard"></div>
    </div>

    <!-- Row 3: Contacts & Companies -->
    <div class="pl-grid-2">
        <div class="pl-card">
            <div class="pl-card-header">
                <div class="pl-card-title">Contacts Overview</div>
                <div class="pl-card-meta">All time</div>
            </div>
            <div id="act-contacts-overview"></div>
        </div>
        <div class="pl-card">
            <div class="pl-card-header">
                <div class="pl-card-title">Monthly Breakdown by Type</div>
                <div class="pl-card-meta">Last 6 months</div>
            </div>
            <div class="pl-chart-wrap" id="act-type-stacked" style="height:260px"></div>
        </div>
    </div>
</section>
