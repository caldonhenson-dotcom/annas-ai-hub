<section id="leads" class="dashboard-section">
    <div class="section-header">
        <div>
            <h2 class="section-title">Leads & Conversion</h2>
            <p class="section-subtitle">Lead sources, marketing funnel, and conversion metrics</p>
        </div>
    </div>

    <!-- KPI Comparison Cards -->
    <div class="pl-activity-totals" id="ld-kpi-totals"></div>

    <!-- Row 1: Lead Trend + Lead Source -->
    <div class="pl-grid-2">
        <div class="pl-card">
            <div class="pl-card-header">
                <div class="pl-card-title">Lead Trend</div>
                <div class="pl-card-meta">Monthly | Last 12 months</div>
            </div>
            <div class="pl-chart-wrap" id="ld-trend-chart" style="height:220px"></div>
        </div>
        <div class="pl-card">
            <div class="pl-card-header">
                <div class="pl-card-title">Leads by Source</div>
                <div class="pl-card-meta">Year to date</div>
            </div>
            <div id="ld-source-table"></div>
        </div>
    </div>

    <!-- Row 2: Lead Status + Source Effectiveness -->
    <div class="pl-grid-2">
        <div class="pl-card">
            <div class="pl-card-header">
                <div class="pl-card-title">Lead Status</div>
                <div class="pl-card-meta">All time</div>
            </div>
            <div id="ld-status-bars"></div>
        </div>
        <div class="pl-card">
            <div class="pl-card-header">
                <div class="pl-card-title">Contacts Trend</div>
                <div class="pl-card-meta">Monthly | Last 12 months</div>
            </div>
            <div class="pl-chart-wrap" id="ld-contacts-chart" style="height:220px"></div>
        </div>
    </div>

    <!-- Row 3: Conversion Funnel (full width) -->
    <div class="pl-card pl-card-full">
        <div class="pl-card-header">
            <div class="pl-card-title">Marketing Funnel</div>
            <div class="pl-card-meta">Last 30 days vs previous 30 days</div>
        </div>
        <div id="ld-conversion-funnel"></div>
    </div>

    <!-- Row 4: Source Detail Table (full width) -->
    <div class="pl-card pl-card-full">
        <div class="pl-card-header">
            <div class="pl-card-title">Source Effectiveness</div>
            <div class="pl-card-meta">Year to date</div>
        </div>
        <div id="ld-source-detail"></div>
    </div>
</section>
