<section id="pipeline" class="dashboard-section">
    <div class="section-header">
        <div>
            <h2 class="section-title">Deals</h2>
            <p class="section-subtitle">HubSpot deal pipeline — real-time sync</p>
        </div>
    </div>

    <!-- ── View Tabs + Period + Export ── -->
    <div class="pl-view-bar">
        <div class="pl-view-tabs" role="tablist">
            <button class="pl-view-tab active" data-view="table" role="tab" aria-selected="true">Table</button>
            <button class="pl-view-tab" data-view="report" role="tab" aria-selected="false">Report</button>
            <button class="pl-view-tab" data-view="gantt" role="tab" aria-selected="false">Gantt</button>
            <button class="pl-view-tab" data-view="export" role="tab" aria-selected="false">Export</button>
        </div>
        <div class="pl-bar-right">
            <div class="pl-period-pills">
                <button class="pl-period-pill" data-period="30d">Past 30 Days</button>
                <button class="pl-period-pill" data-period="mtd">This Month</button>
                <button class="pl-period-pill active" data-period="ytd">YTD</button>
                <button class="pl-period-pill" data-period="all">All Time</button>
            </div>
        </div>
    </div>

    <!-- ── Rolled-Up Summary Cards (with YoY) ── -->
    <div class="pl-summary-row" id="pl-summary-row"></div>

    <!-- ── Department Breakdown ── -->
    <div class="pl-dept-section" id="pl-dept-section">
        <div class="pl-dept-header">
            <span class="pl-dept-header-title">Department Breakdown</span>
            <button class="pl-dept-toggle" id="pl-dept-toggle" aria-expanded="true">&#9660;</button>
        </div>
        <div class="pl-dept-grid" id="pl-dept-grid"></div>
    </div>

    <!-- ── Filters Row ── -->
    <div class="pl-filters-row" id="pl-filters-row">
        <div class="pl-filter-group">
            <label class="pl-filter-label">Owner</label>
            <select id="pl-filter-owner" class="pl-filter-select" aria-label="Filter by deal owner">
                <option value="">All Owners</option>
            </select>
        </div>
        <div class="pl-filter-group">
            <label class="pl-filter-label">Product</label>
            <select id="pl-filter-product" class="pl-filter-select" aria-label="Filter by product">
                <option value="">All Products</option>
            </select>
        </div>
        <div class="pl-filter-group">
            <label class="pl-filter-label">Source</label>
            <select id="pl-filter-source" class="pl-filter-select" aria-label="Filter by source">
                <option value="">All Sources</option>
            </select>
        </div>
        <div class="pl-filter-group">
            <label class="pl-filter-label">Stage</label>
            <select id="pl-filter-stage" class="pl-filter-select" aria-label="Filter by deal stage">
                <option value="">All Stages</option>
            </select>
        </div>
        <div class="pl-filter-count" id="pl-filter-count"></div>
    </div>

    <!-- ── TABLE VIEW ── -->
    <div class="pl-view-panel active" id="pl-view-table" role="tabpanel">
        <div class="pl-card pl-card-full">
            <div class="pl-table-scroll">
                <table class="pl-deals-table" id="pl-deals-tbl">
                    <thead>
                        <tr>
                            <th data-sort="name">Deal Name</th>
                            <th data-sort="stage">Deal Stage</th>
                            <th data-sort="created">Create Date</th>
                            <th data-sort="product">Product</th>
                            <th data-sort="source">eComplete Source</th>
                            <th data-sort="amount" class="num">Amount</th>
                            <th data-sort="owner">Deal Owner</th>
                            <th data-sort="lostReason">Closed Lost Reason</th>
                            <th data-sort="wonReason">Closed Won Reason</th>
                        </tr>
                    </thead>
                    <tbody id="pl-deals-body"></tbody>
                </table>
            </div>
            <div class="pl-table-footer" id="pl-table-footer"></div>
        </div>
    </div>

    <!-- ── REPORT VIEW ── -->
    <div class="pl-view-panel" id="pl-view-report" role="tabpanel">
        <div id="pl-reports-container"></div>
    </div>

    <!-- ── GANTT VIEW ── -->
    <div class="pl-view-panel" id="pl-view-gantt" role="tabpanel">
        <div class="pl-card pl-card-full">
            <div class="pl-card-header">
                <div class="pl-card-title">Deal Timeline</div>
                <div class="pl-card-meta">Created → Close date</div>
            </div>
            <div class="pl-gantt-scroll">
                <div id="pl-gantt-chart"></div>
            </div>
        </div>
    </div>

    <!-- ── EXPORT VIEW ── -->
    <div class="pl-view-panel" id="pl-view-export" role="tabpanel">
        <div id="pl-export-container"></div>
    </div>
</section>
