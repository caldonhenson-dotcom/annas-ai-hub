<section id="targets" class="dashboard-section">
    <div class="section-header">
        <div>
            <h2 class="section-title">Targets & Reverse Engineering</h2>
            <p class="section-subtitle">Revenue targets, required volumes, and gap analysis</p>
        </div>
    </div>

    <!-- KPI Cards -->
    <div class="pl-activity-totals" id="tgt-kpi-totals"></div>

    <!-- Row 1: Target Progress Chart + Required vs Actual -->
    <div class="pl-grid-2">
        <div class="pl-card">
            <div class="pl-card-header">
                <div class="pl-card-title">Target Progress</div>
                <div class="pl-card-meta">Annual target tracking</div>
            </div>
            <div class="pl-chart-wrap" id="tgt-progress-chart" style="height:260px"></div>
        </div>
        <div class="pl-card">
            <div class="pl-card-header">
                <div class="pl-card-title">Required vs Actual</div>
                <div class="pl-card-meta">Monthly volumes</div>
            </div>
            <div id="tgt-required-actual"></div>
        </div>
    </div>

    <!-- Row 2: Gap Analysis + Daily/Weekly Requirements -->
    <div class="pl-grid-2">
        <div class="pl-card">
            <div class="pl-card-header">
                <div class="pl-card-title">Gap Analysis</div>
                <div class="pl-card-meta">Annual shortfalls</div>
            </div>
            <div id="tgt-gap-analysis"></div>
        </div>
        <div class="pl-card">
            <div class="pl-card-header">
                <div class="pl-card-title">Daily / Weekly Requirements</div>
                <div class="pl-card-meta">Run rate needed</div>
            </div>
            <div id="tgt-requirements"></div>
        </div>
    </div>

    <!-- Row 3: What-If Scenarios (full width) -->
    <div class="pl-card pl-card-full">
        <div class="pl-card-header">
            <div class="pl-card-title">What-If Scenarios</div>
            <div class="pl-card-meta">Lead-to-MQL improvement impact</div>
        </div>
        <div id="tgt-whatif"></div>
    </div>
</section>
